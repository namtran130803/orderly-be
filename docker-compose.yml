services:
  soketi:
    image: quay.io/soketi/soketi:1.6-16-debian
    restart: unless-stopped
    ports:
      - "${PUSHER_PORT:-6001}:6001"
      - "${SOKETI_METRICS_PORT:-9601}:9601"
    environment:
      SOKETI_DEBUG: "${SOKETI_DEBUG:-1}"
      SOKETI_DEFAULT_APP_ID: "${PUSHER_APP_ID:-orderly-app}"
      SOKETI_DEFAULT_APP_KEY: "${PUSHER_APP_KEY:-orderly-key}"
      SOKETI_DEFAULT_APP_SECRET: "${PUSHER_APP_SECRET:-orderly-secret}"
      SOKETI_DEFAULT_APP_ENABLE_CLIENT_MESSAGES: "false"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:6001/"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
